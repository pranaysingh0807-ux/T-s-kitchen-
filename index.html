<!-- Storage polyfill: replaces the Claude-artifact-only window.storage with localStorage -->
<script>
  window.storage = {
    async get(key, shared) {
      const k = (shared ? "shared:" : "") + key;
      const v = localStorage.getItem(k);
      if (v === null) throw new Error("not found");
      return { key, value: v, shared: !!shared };
    },
    async set(key, value, shared) {
      const k = (shared ? "shared:" : "") + key;
      localStorage.setItem(k, value);
      return { key, value, shared: !!shared };
    },
    async delete(key, shared) {
      const k = (shared ? "shared:" : "") + key;
      localStorage.removeItem(k);
      return { key, deleted: true, shared: !!shared };
    },
    async list(prefix, shared) {
      const p = (shared ? "shared:" : "") + (prefix || "");
      const keys = Object.keys(localStorage).filter((k) => k.startsWith(p));
      return { keys, prefix, shared: !!shared };
    },
  };
</script>

// ---------- Constants ----------

const CATEGORIES = ["Grains & Staples", "Vegetables", "Fruits", "Dairy & Eggs", "Spices & Condiments", "Proteins", "Other"];

const CATEGORY_COLOR = {
  "Grains & Staples": "#B8873A",
  "Vegetables": "#6E8F5C",
  "Fruits": "#C97A3D",
  "Dairy & Eggs": "#C9A227",
  "Spices & Condiments": "#A8493C",
  "Proteins": "#8A4A3A",
  "Other": "#7A7263",
};

const PERISHABLE_CATS = ["Vegetables", "Fruits", "Dairy & Eggs", "Proteins"];

const STARTER_ITEMS = [
  { name: "Basmati rice", qty: "2 kg", category: "Grains & Staples", threshold: 0.5 },
  { name: "Toor dal", qty: "500 g", category: "Grains & Staples", threshold: 100 },
  { name: "Onion", qty: "6", category: "Vegetables", threshold: 2 },
  { name: "Tomato", qty: "5", category: "Vegetables", threshold: 2 },
  { name: "Garlic", qty: "1 bulb", category: "Vegetables", threshold: 0 },
  { name: "Ginger", qty: "small piece", category: "Vegetables", threshold: 0 },
  { name: "Milk", qty: "1 L", category: "Dairy & Eggs", threshold: 0.25 },
  { name: "Eggs", qty: "6", category: "Dairy & Eggs", threshold: 2 },
  { name: "Cumin seeds", qty: "1 jar", category: "Spices & Condiments", threshold: 0 },
  { name: "Turmeric", qty: "1 jar", category: "Spices & Condiments", threshold: 0 },
];

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function parseNum(qty) {
  const match = String(qty).match(/^(\d+(\.\d+)?)/);
  return match ? parseFloat(match[1]) : null;
}

function isLowStock(item) {
  const num = parseNum(item.qty);
  if (num === null || !item.threshold) return false;
  return num <= item.threshold;
}

function daysUntil(iso) {
  if (!iso) return null;
  const d = new Date(iso);
  return Math.ceil((d.getTime() - Date.now()) / 86400000);
}

function formatWhen(iso) {
  const d = new Date(iso);
  const days = Math.floor((Date.now() - d.getTime()) / 86400000);
  if (days <= 0) return "today";
  if (days === 1) return "yesterday";
  if (days < 7) return `${days} days ago`;
  const weeks = Math.floor(days / 7);
  if (weeks === 1) return "last week";
  if (weeks < 5) return `${weeks} weeks ago`;
  return d.toLocaleDateString("en-IN", { day: "numeric", month: "short" });
}

function matchPantryItem(pantry, name) {
  const n = name.toLowerCase();
  return (
    pantry.find((i) => i.name.toLowerCase() === n) ||
    pantry.find((i) => i.name.toLowerCase().includes(n) || n.includes(i.name.toLowerCase()))
  );
}

// Helper: call our own backend, which forwards to Gemini.
// Pass a text prompt and (optionally) a base64 image to analyze.
// Gemini is asked to return raw JSON (response_mime_type), so no markdown
// fence-stripping is needed on the way back.
async function callGemini(prompt, imageBase64, imageMime) {
  const parts = [];
  if (imageBase64) {
    parts.push({ inline_data: { mime_type: imageMime || "image/jpeg", data: imageBase64 } });
  }
  parts.push({ text: prompt });

  const body = {
    contents: [{ parts }],
    generationConfig: { response_mime_type: "application/json" },
  };

  const response = await fetch("/api/gemini", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  const data = await response.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) {
    console.error("Unexpected Gemini response:", data);
    throw new Error(data?.error?.message || "No response from Gemini");
  }
  return JSON.parse(text);
}

const VEG_RULE = "STRICT RULE: only vegetarian recipes plus egg dishes are allowed. Never suggest meat, chicken, mutton, fish, prawns, or any other seafood, in any recipe, ever.";

export default function App() {

  const [purring, setPurring] = useState(false);
  const [addName, setAddName] = useState("");

  const [addCategory, setAddCategory] = useState(CATEGORIES[0]);
  const [addThreshold, setAddThreshold] = useState("");
  const [addExpiry, setAddExpiry] = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const [editingThreshold, setEditingThreshold] = useState(null);
  const [thresholdDraft, setThresholdDraft] = useState("");

  const [recipes, setRecipes] = useState(null);
  const [thinking, setThinking] = useState(false);
  const [error, setError] = useState("");
  const [craving, setCraving] = useState("");

  const [history, setHistory] = useState([]);
  const [showHistory, setShowHistory] = useState(false);

  const [favorites, setFavorites] = useState([]);
  const [showFavorites, setShowFavorites] = useState(false);

  const [shoppingList, setShoppingList] = useState([]);
  const [showShoppingList, setShowShoppingList] = useState(false);

  const [deductPrompt, setDeductPrompt] = useState(null);

  const [photoAnalyzing, setPhotoAnalyzing] = useState(false);
  const [photoError, setPhotoError] = useState("");
  const fileInputRef = useRef(null);

  const purringTimeout = useRef(null);

  useEffect(() => {
    (async () => {
      try {
        const result = await window.storage.get("pantry");
        setPantry(result?.value ? JSON.parse(result.value) : STARTER_ITEMS.map((i) => ({ ...i, id: uid() })));
      } catch {
        setPantry(STARTER_ITEMS.map((i) => ({ ...i, id: uid() })));
      }
      try {
        const h = await window.storage.get("cookHistory");
        if (h?.value) setHistory(JSON.parse(h.value));
      } catch {}
      try {
        const f = await window.storage.get("favorites");
        if (f?.value) setFavorites(JSON.parse(f.value));
      } catch {}
      try {
        const s = await window.storage.get("shoppingList");
        if (s?.value) setShoppingList(JSON.parse(s.value));
      } catch {}
      setLoaded(true);
    })();
  }, []);

  useEffect(() => {
    if (!loaded) return;
    (async () => {
      try {
        await window.storage.set("pantry", JSON.stringify(pantry));
        setPurring(true);
        clearTimeout(purringTimeout.current);
        purringTimeout.current = setTimeout(() => setPurring(false), 1200);
      } catch (e) { console.error(e); }
    })();
  }, [pantry, loaded]);

  useEffect(() => {
    if (!loaded) return;
    window.storage.set("cookHistory", JSON.stringify(history)).catch(console.error);
  }, [history, loaded]);

  useEffect(() => {
    if (!loaded) return;
    window.storage.set("favorites", JSON.stringify(favorites)).catch(console.error);
  }, [favorites, loaded]);

  useEffect(() => {
    if (!loaded) return;
    window.storage.set("shoppingList", JSON.stringify(shoppingList)).catch(console.error);
  }, [shoppingList, loaded]);

  function addItem() {
    if (!addName.trim()) return;
    const thresholdNum = parseFloat(addThreshold);
    setPantry((p) => [
      {
        id: uid(),
        name: addName.trim(),
        qty: addQty.trim() || "some",
        category: addCategory,
        threshold: Number.isFinite(thresholdNum) ? thresholdNum : 0,
        expiresOn: addExpiry || null,
      },
      ...p,
    ]);
    setAddName(""); setAddQty(""); setAddThreshold(""); setAddExpiry(""); setShowAdd(false);
  }

  function removeItem(id) {
    setPantry((p) => p.filter((i) => i.id !== id));
  }

  function bumpQty(id, dir) {
    setPantry((p) =>
      p.map((i) => {
        if (i.id !== id) return i;
        const match = i.qty.match(/^(\d+(\.\d+)?)(.*)$/);
        if (match) {
          const num = parseFloat(match[1]) + dir;
          if (num <= 0) return i;
          return { ...i, qty: `${num % 1 === 0 ? num : num.toFixed(1)}${match[3]}` };
        }
        return i;
      })
    );
  }

  function startEditThreshold(item) {
    setEditingThreshold(item.id);
    setThresholdDraft(item.threshold ? String(item.threshold) : "");
  }
  function saveThreshold(id) {
    const num = parseFloat(thresholdDraft);
    setPantry((p) => p.map((i) => (i.id === id ? { ...i, threshold: Number.isFinite(num) && num >= 0 ? num : 0 } : i)));
    setEditingThreshold(null); setThresholdDraft("");
  }

  function logCooked(recipe) {
    setHistory((h) => [
      { id: uid(), name: recipe.name, description: recipe.description, cookedAt: new Date().toISOString() },
      ...h,
    ].slice(0, 50));
  }

  function deductIngredients(recipe) {
    setPantry((p) =>
      p.map((item) => {
        const used = recipe.usesFromPantry?.some((name) => matchPantryItem(p, name)?.id === item.id);
        if (!used) return item;
        const match = item.qty.match(/^(\d+(\.\d+)?)(.*)$/);
        if (!match) return item;
        const num = Math.max(0, parseFloat(match[1]) - 1);
        return { ...item, qty: num === 0 ? `0${match[3]}` : `${num % 1 === 0 ? num : num.toFixed(1)}${match[3]}` };
      })
    );
    setDeductPrompt(null);
  }

  function toggleFavorite(recipe) {
    setFavorites((f) => {
      const exists = f.some((r) => r.name === recipe.name);
      if (exists) return f.filter((r) => r.name !== recipe.name);
      return [{ ...recipe, savedAt: new Date().toISOString() }, ...f];
    });
  }
  function isFavorite(recipe) {
    return favorites.some((r) => r.name === recipe.name);
  }

  function addToShoppingList(items) {
    setShoppingList((list) => {
      const existingNames = new Set(list.map((i) => i.name.toLowerCase()));
      const fresh = items.filter((n) => !existingNames.has(n.toLowerCase())).map((n) => ({ id: uid(), name: n, done: false }));
      return [...list, ...fresh];
    });
    setShowShoppingList(true);
  }
  function toggleShoppingItem(id) {
    setShoppingList((list) => list.map((i) => (i.id === id ? { ...i, done: !i.done } : i)));
  }
  function removeShoppingItem(id) {
    setShoppingList((list) => list.filter((i) => i.id !== id));
  }
  function clearCheckedShopping() {
    setShoppingList((list) => list.filter((i) => !i.done));
  }

  async function rescaleRecipe(recipe, index, multiplier) {
    setThinking(true);
    setError("");
    const prompt = `You are Pranay, a warm orange tabby chef cat. Rescale this recipe for a different number of servings.

${VEG_RULE}

Original recipe (JSON): ${JSON.stringify(recipe)}

Scale it by a factor of ${multiplier}x (e.g. if original served 2 and multiplier is 2, now serves 4). Adjust ingredient quantities mentioned in usesFromPantry and missing sensibly (add approximate quantities in parentheses if helpful), and adjust step instructions if quantities are mentioned in them.

Respond ONLY with valid JSON, in exactly this shape:
{
  "name": "string",
  "description": "string",
  "usesFromPantry": ["string", ...],
  "missing": ["string", ...],
  "steps": ["string", ...]
}`;
    try {
      const rescaled = await callGemini(prompt);
      setRecipes((r) => {
        const copy = { ...r, recipes: [...r.recipes] };
        copy.recipes[index] = { ...rescaled, servingsMultiplier: (recipe.servingsMultiplier || 1) * multiplier };
        return copy;
      });
    } catch (e) {
      console.error(e);
      setError("Pranay fumbled the measuring cups. Try again.");
    } finally {
      setThinking(false);
    }
  }

  async function handlePhotoUpload(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    setPhotoAnalyzing(true);
    setPhotoError("");
    try {
      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
      const mediaType = file.type || "image/jpeg";

      const photoPrompt = `Look at this photo of groceries or ingredients. List every distinct food item you can identify, with a best-guess quantity and a category from exactly this list: ${CATEGORIES.join(", ")}. Respond ONLY with valid JSON, in exactly this shape: {"items": [{"name": "string", "qty": "string", "category": "string"}]}`;

      const parsed = await callGemini(photoPrompt, base64, mediaType);
      const newItems = (parsed.items || []).map((i) => ({
        id: uid(),
        name: i.name,
        qty: i.qty || "some",
        category: CATEGORIES.includes(i.category) ? i.category : "Other",
        threshold: 0,
        expiresOn: null,
      }));
      if (newItems.length === 0) {
        setPhotoError("Laila couldn't spot anything in that photo — try a clearer shot.");
      } else {
        setPantry((p) => [...newItems, ...p]);
      }
    } catch (err) {
      console.error(err);
      setPhotoError("Laila couldn't read that photo. Try again?");
    } finally {
      setPhotoAnalyzing(false);
      if (fileInputRef.current) fileInputRef.current.value = "";
    }
  }

  async function askPranay() {
    if (pantry.length === 0) {
      setError("Laila's shelf is empty — add some ingredients first.");
      return;
    }
    setThinking(true);
    setError("");
    setRecipes(null);

    const ingredientList = pantry.map((i) => `${i.name} (${i.qty})`).join(", ");
    const cravingLine = craving.trim()
      ? `Tammana is specifically in the mood for: "${craving.trim()}". Prioritize this if realistically possible with her ingredients, otherwise get as close as you can.`
      : "";
    const recentNames = history.slice(0, 8).map((h) => h.name);
    const historyLine = recentNames.length
      ? `She's recently cooked: ${recentNames.join(", ")}. Avoid repeating these exact dishes unless nothing else fits her pantry — variety is welcome.`
      : "";
    const lowStockNames = pantry.filter(isLowStock).map((i) => i.name);
    const lowStockLine = lowStockNames.length
      ? `Running low on: ${lowStockNames.join(", ")}. Where reasonable, prefer recipes that don't lean heavily on these.`
      : "";
    const expiringSoon = pantry.filter((i) => {
      const d = daysUntil(i.expiresOn);
      return d !== null && d <= 3;
    }).map((i) => i.name);
    const expiryLine = expiringSoon.length
      ? `These are close to expiring and should be prioritized if possible: ${expiringSoon.join(", ")}.`
      : "";

    const prompt = `You are Pranay, a warm, encouraging orange tabby chef cat who helps a home cook named Tammana figure out what to cook. She has given you her exact current pantry. Suggest what she can make.

${VEG_RULE}

Pantry: ${ingredientList}

${cravingLine}
${historyLine}
${lowStockLine}
${expiryLine}

Cuisine style: a natural mix of Indian home cooking, including quick "jugaadu" improvised fixes real home cooks make when short on things (e.g. leftover-rice fry-ups, bread-based snacks, single-pot combos), plus Western home cooking where it genuinely fits — whatever actually fits her ingredients best, don't force any one style.

Rules:
- Only suggest recipes she can realistically make with what's listed (assume she also has basic salt, oil, and water on hand, nothing else).
- Give exactly 10 to 12 recipe ideas, ranging from fully makeable now to "almost — just needs one or two more things". Aim for real variety: different main ingredients, different cooking styles, different meal types (quick weeknight, weekend project, snack, jugaadu fix, etc) — don't just give minor variations of the same dish.
- For each recipe include: a name, a one-line description in Pranay's warm/encouraging voice, the ingredients from her pantry it uses, any missing ingredients (empty array if none), and 3-6 short numbered cooking steps.
- Keep step instructions concise and practical, like real cooking instructions.
- Assume each recipe as written serves 2 unless the dish implies otherwise.

Respond ONLY with valid JSON, no preamble, in exactly this shape:
{
  "pranaySays": "one warm sentence from Pranay introducing the batch of ideas",
  "recipes": [
    {
      "name": "string",
      "description": "string",
      "usesFromPantry": ["string", ...],
      "missing": ["string", ...],
      "steps": ["string", ...],
      "readyNow": true
    }
  ]
}`;

    try {
      const parsed = await callGemini(prompt);
      parsed.recipes = parsed.recipes.map((r) => ({ ...r, servingsMultiplier: 1 }));
      setRecipes(parsed);
    } catch (e) {
      console.error(e);
      setError("Pranay got distracted chasing a string. Try again in a moment.");
    } finally {
      setThinking(false);
    }
  }

  const grouped = CATEGORIES.map((cat) => ({
    category: cat,
    items: pantry.filter((i) => i.category === cat),
  })).filter((g) => g.items.length > 0);

  const expiringItems = pantry.filter((i) => {
    const d = daysUntil(i.expiresOn);
    return d !== null && d <= 3;

  return (
    <div className="min-h-screen kitchen-bg">

      <div className="max-w-3xl mx-auto px-5 py-10 md:py-14">
        <header className="mb-10 text-center">
          <p className="eyebrow">— tammana's kitchen —</p>
          <h1 className="hero-title">What's in the house today?</h1>
          <p className="hero-sub">Laila keeps the shelf. Pranay figures out dinner.</p>

        <section className="panel mb-8">
          <div className="panel-head">
            <div className="avatar-wrap"><LailaKitten purring={purring} /></div>
            <div className="flex-1">

              <p className="panel-sub">
                {pantry.length === 0 ? "Nothing here yet — add the first thing." : `${pantry.length} ${pantry.length === 1 ? "item" : "items"} saved`}
              </p>
            </div>
            <div className="head-actions">
              <button className="btn-icon" onClick={() => fileInputRef.current?.click()} title="Add ingredients from a photo" disabled={photoAnalyzing}>

              </button>
              <input ref={fileInputRef} type="file" accept="image/*" className="hidden-input" onChange={handlePhotoUpload} />

          {photoError && <p className="error-note">{photoError}</p>}

          {showAdd && (
            <div className="add-row">
              <input className="field field-name" placeholder="Ingredient, e.g. Paneer" value={addName}
                onChange={(e) => setAddName(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addItem()} autoFocus />
              <input className="field field-qty" placeholder="Qty, e.g. 250 g" value={addQty}
                onChange={(e) => setAddQty(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addItem()} />
              <select className="field field-cat" value={addCategory} onChange={(e) => setAddCategory(e.target.value)}>
                {CATEGORIES.map((c) => <option key={c} value={c}>{c}</option>)}
              </select>
              <input className="field field-threshold" placeholder="Warn below (optional)" value={addThreshold}
                onChange={(e) => setAddThreshold(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addItem()} inputMode="decimal" />
              {PERISHABLE_CATS.includes(addCategory) && (
                <input className="field field-expiry" type="date" value={addExpiry}
                  onChange={(e) => setAddExpiry(e.target.value)} title="Use by (optional)" />
              )}
              <button className="btn-secondary" onClick={addItem}>Save to shelf</button>
            </div>
          )}

          {expiringItems.length > 0 && (
            <div className="expiry-banner">
              <CalendarClock size={14} strokeWidth={2.5} />
              <span>Use soon: {expiringItems.map((i) => i.name).join(", ")}.</span>
            </div>
          )}

          {(() => {
            const low = pantry.filter(isLowStock);
            if (low.length === 0) return null;
            return (
              <div className="low-stock-banner">
                <AlertTriangle size={14} strokeWidth={2.5} />
                <span>Laila's noticed you're running low on {low.map((i) => i.name).join(", ")}.</span>
              </div>
            );
          })()}

          {grouped.length === 0 ? (
            <p className="empty-note">Tap "Add" to give Laila something to guard.</p>
          ) : (
            <div className="shelf">
              {grouped.map((g) => (
                <div key={g.category} className="shelf-group">
                  <p className="shelf-label" style={{ color: CATEGORY_COLOR[g.category] }}>{g.category}</p>
                  <div className="chip-row">
                    {g.items.map((item) => {
                      const low = isLowStock(item);
                      const expDays = daysUntil(item.expiresOn);
                      const expiringSoon = expDays !== null && expDays <= 3;
                      return (
                        <div key={item.id} className={`chip ${low ? "chip-low" : ""}`}
                          style={{ borderColor: low ? "#A8493C" : CATEGORY_COLOR[g.category] + "55" }}>
                          {low && <AlertTriangle size={11} strokeWidth={2.5} className="chip-low-icon" />}
                          <span className="chip-name">{item.name}</span>
                          <div className="chip-controls">
                            <button onClick={() => bumpQty(item.id, -1)} aria-label={`Reduce ${item.name}`}><Minus size={11} strokeWidth={3} /></button>
                            <span className="chip-qty">{item.qty}</span>
                            <button onClick={() => bumpQty(item.id, 1)} aria-label={`Increase ${item.name}`}><Plus size={11} strokeWidth={3} /></button>
                          </div>
                          {expiringSoon && (
                            <span className="chip-expiry" title="Use soon">
                              <CalendarClock size={11} strokeWidth={2.5} />
                              {expDays <= 0 ? "today" : `${expDays}d`}
                            </span>
                          )}
                          {editingThreshold === item.id ? (
                            <div className="threshold-edit">
                              <input className="threshold-input" value={thresholdDraft}
                                onChange={(e) => setThresholdDraft(e.target.value)}
                                onKeyDown={(e) => e.key === "Enter" && saveThreshold(item.id)} placeholder="0" inputMode="decimal" autoFocus />
                              <button onClick={() => saveThreshold(item.id)} aria-label="Save threshold"><Check size={11} strokeWidth={3} /></button>
                            </div>
                          ) : (
                            <button className="chip-threshold-btn" onClick={() => startEditThreshold(item)} title="Set low-stock warning threshold" aria-label={`Set low stock threshold for ${item.name}`}>
                              <Settings2 size={11} strokeWidth={2.5} />
                            </button>
                          )}
                          <button className="chip-remove" onClick={() => removeItem(item.id)} aria-label={`Remove ${item.name}`}><X size={12} strokeWidth={2.5} /></button>
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          )}
        </section>

        {shoppingList.length > 0 && (
          <section className="panel panel-shopping mb-8">
            <div className="panel-head">
              <div className="avatar-wrap avatar-wrap-shopping"><ShoppingBag size={22} strokeWidth={1.8} /></div>
              <div className="flex-1">
                <h2 className="panel-title">Shopping list</h2>
                <p className="panel-sub">{shoppingList.filter((i) => !i.done).length} to pick up</p>

              <button className="btn-ghost" onClick={() => setShowShoppingList((s) => !s)}>{showShoppingList ? "Hide" : "Show"}</button>
            </div>
            {showShoppingList && (
              <div className="shopping-panel">
                <ul className="shopping-list">
                  {shoppingList.map((item) => (
                    <li key={item.id} className={item.done ? "shopping-done" : ""}>
                      <button className="shopping-check" onClick={() => toggleShoppingItem(item.id)} aria-label={`Toggle ${item.name}`}>
                        {item.done && <Check size={11} strokeWidth={3} />}
                      </button>
                      <span className="shopping-name">{item.name}</span>
                      <button className="chip-remove" onClick={() => removeShoppingItem(item.id)} aria-label={`Remove ${item.name}`}><X size={12} strokeWidth={2.5} /></button>
                    </li>
                  ))}
                </ul>
                {shoppingList.some((i) => i.done) && (
                  <button className="btn-ghost" onClick={clearCheckedShopping} style={{ marginTop: 10 }}>
                    <Trash2 size={13} strokeWidth={2.2} /> Clear checked
                  </button>
                )}
              </div>
            )}
          </section>
        )}

        <section className="panel panel-pranay">
          <div className="panel-head">
            <div className="avatar-wrap avatar-wrap-pranay"><PranayKitten thinking={thinking} /></div>
            <div className="flex-1">
              <h2 className="panel-title">Ask Pranay</h2>
              <p className="panel-tagline">your personal chef, even when I'm not there</p>
            </div>
            <div className="head-actions">
              <button className="btn-ghost" onClick={() => setShowFavorites((s) => !s)}>
                <Star size={14} strokeWidth={2.2} />
                {showFavorites ? "Hide" : `Saved${favorites.length ? ` (${favorites.length})` : ""}`}
              </button>
              <button className="btn-ghost" onClick={() => setShowHistory((s) => !s)}>
                <History size={14} strokeWidth={2.2} /> {showHistory ? "Hide log" : "Cook log"}
              </button>
            </div>
          </div>

          {showFavorites && (
            <div className="history-panel">

                <p className="empty-note">No saved recipes yet — tap the star on any recipe to keep it here.</p>

                    <RecipeCard key={r.name + idx} recipe={r} isFav onToggleFav={() => toggleFavorite(r)}
                      onCooked={() => logCooked(r)} onRequestDeduct={() => setDeductPrompt(r)}
                      onAddMissingToList={() => addToShoppingList(r.missing || [])} onRescale={null} />
                  ))}
                </div>
              )}
            </div>
          )}

          {showHistory && (
            <div className="history-panel">
              {history.length === 0 ? (

              {thinking ? <Loader2 size={16} className="spin" /> : <Sparkles size={16} />}

            </button>
          </div>

          {error && <p className="error-note">{error}</p>}

          {recipes && (
            <div className="results">
              <p className="pranay-says">"{recipes.pranaySays}"</p>
              <div className="recipe-grid">
                {recipes.recipes.map((r, idx) => (
                  <RecipeCard key={idx} recipe={r} isFav={isFavorite(r)} onToggleFav={() => toggleFavorite(r)}
                    onCooked={() => { logCooked(r); setDeductPrompt(r); }}
                    onRequestDeduct={() => setDeductPrompt(r)}
                    onAddMissingToList={() => addToShoppingList(r.missing || [])}
                    onRescale={(mult) => rescaleRecipe(r, idx, mult)} />
                ))}
              </div>
            </div>
          )}
        </section>

        <footer className="footer-note">Saved privately for Tammana. Laila never forgets.</footer>
      </div>

      {deductPrompt && (
        <div className="modal-backdrop" onClick={() => setDeductPrompt(null)}>
          <div className="modal" onClick={(e) => e.stopPropagation()}>
            <h3 className="modal-title">Update the shelf?</h3>
            <p className="modal-body">Should Laila subtract what "{deductPrompt.name}" used from your pantry?</p>
            <div className="modal-actions">
              <button className="btn-secondary" onClick={() => deductIngredients(deductPrompt)}>Yes, update it</button>
              <button className="btn-ghost" onClick={() => setDeductPrompt(null)}>Not now</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function RecipeCard({ recipe, isFav, onToggleFav, onCooked, onRequestDeduct, onAddMissingToList, onRescale }) {
  const [open, setOpen] = useState(false);
  const [cooked, setCooked] = useState(false);
  const ready = recipe.missing?.length === 0;
  const multiplier = recipe.servingsMultiplier || 1;
  const baseServings = 2;

  function handleCooked() {
    setCooked(true);
    onCooked?.();
  }

  return (
    <div className={`recipe-card ${ready ? "recipe-ready" : ""}`}>
      <div className="recipe-card-top">
        <ChefHat size={16} strokeWidth={2} className="recipe-icon" />
        <div className="recipe-card-top-right">
          <span className={`recipe-badge ${ready ? "badge-ready" : "badge-almost"}`}>{ready ? "Ready now" : "Almost there"}</span>
          <button className={`fav-btn ${isFav ? "fav-btn-active" : ""}`} onClick={onToggleFav} aria-label={isFav ? "Remove from saved" : "Save recipe"}>
            <Star size={15} strokeWidth={2} fill={isFav ? "currentColor" : "none"} />
          </button>
        </div>
      </div>
      <h3 className="recipe-name">{recipe.name}</h3>
      <p className="recipe-desc">{recipe.description}</p>

      {recipe.missing?.length > 0 && (
        <div className="recipe-missing-row">
          <p className="recipe-missing">Needs: {recipe.missing.join(", ")}</p>
          {onAddMissingToList && (
            <button className="recipe-list-btn" onClick={onAddMissingToList} title="Add to shopping list">
              <ShoppingBag size={12} strokeWidth={2.2} />
            </button>
          )}
        </div>
      )}

      {onRescale && (
        <div className="servings-row">
          <Users size={13} strokeWidth={2.2} />
          <span className="servings-label">Serves {baseServings * multiplier}</span>
          <button className="servings-btn" onClick={() => onRescale(2)} title="Double it">×2</button>
          <button className="servings-btn" onClick={() => onRescale(0.5)} title="Halve it">÷2</button>
        </div>
      )}

      <div className="recipe-actions">
        <button className="recipe-toggle" onClick={() => setOpen((o) => !o)}>{open ? "Hide steps" : "Show steps"}</button>
        <button className={`recipe-cooked-btn ${cooked ? "recipe-cooked-done" : ""}`} onClick={handleCooked} disabled={cooked}>
          {cooked ? <><Check size={12} strokeWidth={3} /> Logged</> : "Mark as cooked"}
        </button>
      </div>

      {open && (
        <ol className="recipe-steps">
          {recipe.steps.map((s, i) => <li key={i}>{s}</li>)}
        </ol>
      )}
    </div>
  );
}

.pranay-says { font-style: italic; color: #6E5030; font-size: 15px; margin: 18px 2px 16px; }
.recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
.recipe-card { background: #FFFBF3; border: 1.5px solid #E3CFA3; border-radius: 14px; padding: 14px; }
.recipe-ready { border-color: #B9CBA9; }
.recipe-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.recipe-card-top-right { display: flex; align-items: center; gap: 8px; }
.recipe-icon { color: #A8493C; }
.recipe-badge { font-family: system-ui, -apple-system, sans-serif; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 3px 8px; border-radius: 999px; }
.badge-ready { background: #E3EDD9; color: #3A5A2E; }
.badge-almost { background: #F6E6D2; color: #8A5A20; }
.fav-btn { border: none; background: none; cursor: pointer; color: #C4B79A; display: flex; padding: 0; }
.fav-btn-active { color: #C9A227; }
.recipe-name { font-size: 16px; font-weight: 700; margin: 0 0 6px; color: #3A2A20; }
.recipe-desc { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; color: #8A7A63; margin: 0 0 8px; line-height: 1.45; }
.recipe-missing-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin: 0 0 10px; }
.recipe-missing { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; color: #A8672A; margin: 0; }
.recipe-list-btn { border: none; background: #F6E9D8; color: #8A5A20; border-radius: 6px; padding: 4px 6px; display: flex; align-items: center; cursor: pointer; flex-shrink: 0; }
.recipe-list-btn:hover { background: #EFDBB8; }
.servings-row { display: flex; align-items: center; gap: 6px; margin: 0 0 10px; font-family: system-ui, -apple-system, sans-serif; font-size: 12px; color: #6E5030; }
.servings-label { flex: 1; }
.servings-btn { border: 1px solid #E3CFA3; background: #FBF3E4; color: #6E5030; border-radius: 6px; font-size: 11px; font-weight: 700; padding: 3px 7px; cursor: pointer; }
.servings-btn:hover { background: #F1E0BE; }
.recipe-toggle { font-family: system-ui, -apple-system, sans-serif; background: none; border: none; color: #A8493C; font-weight: 700; font-size: 12.5px; cursor: pointer; padding: 0; }
.recipe-steps { font-family: system-ui, -apple-system, sans-serif; font-size: 12.5px; color: #4A4030; margin: 10px 0 0; padding-left: 18px; line-height: 1.6; }
.recipe-actions { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.recipe-cooked-btn { font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; gap: 4px; background: #EEE4CE; color: #4A4030; border: none; font-size: 11.5px; font-weight: 700; padding: 5px 10px; border-radius: 999px; cursor: pointer; }
.recipe-cooked-btn:hover { background: #E3EDD9; }
.recipe-cooked-done { background: #E3EDD9; color: #3A5A2E; cursor: default; }
.footer-note { text-align: center; font-family: system-ui, -apple-system, sans-serif; font-size: 12px; color: #C4B79A; margin-top: 24px; }
.modal-backdrop { position: fixed; inset: 0; background: rgba(58,42,32,0.35); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 50; }
.modal { background: #FFFBF3; border-radius: 16px; padding: 22px; max-width: 340px; width: 100%; border: 1px solid #E6D6B8; }
.modal-title { font-size: 17px; font-weight: 700; margin: 0 0 8px; color: #3A2A20; }
.modal-body { font-family: system-ui, -apple-system, sans-serif; font-size: 13.5px; color: #6E5030; margin: 0 0 16px; line-height: 1.5; }
.modal-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.spin { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.laila-purr { animation: purr 1.2s ease-in-out; }
@keyframes purr { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); } }
.pranay-think { animation: think 0.9s ease-in-out infinite; }
@keyframes think { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-3deg); } 75% { transform: rotate(3deg); } }
@media (prefers-reduced-motion: reduce) { .laila-purr, .pranay-think, .spin { animation: none; } }
`;

createRoot(document.getElementById("root")).render(<App />);
</script>
